<!DOCTYPE html>
<html>
<head>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
  >
  <style>
    form fieldset {
      border: 2px solid #9aa4b2;
      border-radius: 8px;
      padding: 1rem;
      margin: 0;
    }

    form legend {
      padding: 0 0.5rem;
      font-weight: 600;
      color: #1f2937;
    }
  </style>
  <title>Return Book</title>
</head>
<body>
  <main class="container">
    <h1>Return Book</h1>
    <p>Fill in the form to return a borrowed book.</p>

    <a href="index.html">Back to Dashboard</a>

    <br><br>

    <form>
      <fieldset>
        <legend>Return Information</legend>

        <label>Member Name</label><br>
        <input type="text"><br><br>

        <label>Book Title</label><br>
        <input type="text"><br><br>

        <label>Return Date</label><br>
        <input type="date"><br><br>

        <label>Book Condition</label><br>
        <select>
          <option>Good</option>
          <option>Damaged</option>
        </select><br><br>

        <label>Notes</label><br>
        <textarea rows="4"></textarea><br><br>

        <button type="submit">Return Book</button>
      </fieldset>
    </form>
  </main>
</body>
</html>
