<!DOCTYPE html>
<html>
<head>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
  >
  <style>
    form fieldset {
      border: 2px solid #9aa4b2;
      border-radius: 8px;
      padding: 1rem;
      margin: 0;
    }

    form legend {
      padding: 0 0.5rem;
      font-weight: 600;
      color: #1f2937;
    }
  </style>
  <title>Library Login</title>
</head>
<body>
  <main class="container">
    <h1>Library Management System</h1>
    <h2>Login</h2>

    <p>Please login to access the library system</p>

    <form action="index.html" method="get">
      <fieldset>
        <legend>Login Form</legend>

        <label>Email</label> <br>
        <input type="email">

        <br><br>

        <label>Password</label> <br>
        <input type="password">

        <br><br>

        <button type="submit">Login</button>
      </fieldset>
    </form>

    <p>
      If login is successful, go to the
      <a href="index.html">Dashboard</a>
    </p>
  </main>
</body>
</html>
