<!DOCTYPE html>
<html>
<head>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
  >
  <title>Book List</title>
</head>
<body>
  <main class="container">
    <h1>Library Books</h1>
    <p>List of available books in the library.</p>

    <a href="index.html">Back to Dashboard</a>

    <br><br>

    <div>
      <h2>Book Information</h2>
    </div>

    <table border="1">
      <tr>
        <th>ID</th>
        <th>Book Cover</th>
        <th>Title</th>
        <th>Author</th>
        <th>Year</th>

      <tr>
        <td>1</td>
        <td><img src="assets/covers/book1.jpg" width="80" alt="Learning HTML cover"></td>
        <td>Learning HTML</td>
        <td>John Smith</td>
        <td>2024</td>
      </tr>

      <tr>
        <td>2</td>
        <td><img src="assets/covers/book2.jpg" width="80" alt="Web Development Basics cover"></td>
        <td>Web Development Basics</td>
        <td>Anna Lee</td>
        <td>2023</td>
      </tr>

      <tr>
        <td>3</td>
        <td><img src="assets/covers/book1.jpg" width="80" alt="CSS Fundamentals cover"></td>
        <td>CSS Fundamentals</td>
        <td>David Kim</td>
        <td>2025</td>
      </tr>
    </table>
  </main>
</body>
</html>
